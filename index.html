<style>
  :root {
    --bg: #04030a;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);
    --text: #f2ece0;
    --muted: rgba(232,224,208,0.82);
    --accent: #c9a96e;
    --glow: rgba(201,169,110,0.2);
    --freq-color: #c9a96e;
    --freq-glow: rgba(201,169,110,0.35);
    --orb1: #1a0a2e;
    --orb2: #0a1a2e;
    --particle: rgba(201,169,110,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── Canvas de fundo ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Layout ── */
  .shell {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 28px 100px;
  }

  /* ── Cabeçalho ── */
  header {
    text-align: center;
    margin-bottom: 56px;
  }
  .logo-mark {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--accent);
    opacity: 0.9;
    text-transform: uppercase;
    margin-bottom: 18px;
    display: block;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 7vw, 60px);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .subtitle {
    margin-top: 14px;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── Campo de intenção ── */
  .intention-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px;
    margin-bottom: 24px;
    backdrop-filter: blur(20px);
    transition: border-color 0.4s;
  }
  .intention-box:focus-within {
    border-color: rgba(201,169,110,0.3);
    box-shadow: 0 0 40px rgba(201,169,110,0.06);
  }
  .intention-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--accent);
    opacity: 1;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: block;
  }
  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    line-height: 1.6;
    resize: none;
    min-height: 90px;
    caret-color: var(--accent);
  }
  textarea::placeholder {
    color: rgba(232,224,208,0.2);
    font-style: italic;
  }

  /* ── Botão invocar ── */
  .btn-invocar {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    padding: 18px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
  }
  .btn-invocar::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
    z-index: -1;
  }
  .btn-invocar:hover::before { transform: scaleX(1); }
  .btn-invocar:hover { color: var(--bg); }
  .btn-invocar:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-invocar:disabled::before { display: none; }

  /* ── Carregando ── */
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
  }
  .loading.active { display: block; }
  .loading-ring {
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--muted);
  }

  /* ── Resultado ── */
  #resultado {
    display: none;
    animation: fadeUp 0.8s ease forwards;
  }
  #resultado.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Card de frequência ── */
  .freq-card {
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .freq-header {
    padding: 24px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid var(--border);
  }
  .freq-orb {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    animation: pulse-orb 3s ease-in-out infinite;
  }
  @keyframes pulse-orb {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.08); filter: brightness(1.2); }
  }
  .freq-info { flex: 1; }
  .freq-hz {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--freq-color);
    line-height: 1;
  }
  .freq-nome {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--text);
    margin-top: 4px;
  }
  .freq-intent {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── Player ── */
  .player-area {
    padding: 24px 28px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--border);
  }
  .waveform {
    height: 48px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 2px;
    overflow: hidden;
  }
  .wave-bar {
    flex: 1;
    background: var(--freq-color);
    border-radius: 1px;
    opacity: 0.3;
    transition: height 0.1s;
  }
  .player-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .btn-play {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--freq-color);
    background: transparent;
    color: var(--freq-color);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .btn-play:hover, .btn-play.active {
    background: var(--freq-color);
    color: var(--bg);
  }
  .vol-group {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }
  .vol-label {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 1px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--freq-color);
    cursor: pointer;
  }
  .duration-display {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--muted);
    min-width: 48px;
    text-align: right;
  }

  /* ── Botão binaural ── */
  .binaural-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    cursor: pointer;
  }
  .toggle-track {
    width: 36px;
    height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    transition: background 0.3s;
  }
  .toggle-track.on { background: var(--freq-color); }
  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.3s;
  }
  .toggle-track.on .toggle-thumb { transform: translateX(18px); }
  .toggle-label {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── Seções de insight ── */
  .insights-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 20px 28px;
  }
  @media (max-width: 560px) { .insights-grid { grid-template-columns: 1fr; } }

  .insight-block {
    background: rgba(0,0,0,0.15);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 18px;
  }
  .insight-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--accent);
    opacity: 1;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .insight-content {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    line-height: 1.7;
    color: var(--text);
    font-weight: 300;
  }
  .insight-content ul {
    list-style: none;
    padding: 0;
  }
  .insight-content li {
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 16px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .insight-content li:last-child { border-bottom: none; }
  .insight-content li::before {
    content: '◈';
    color: var(--accent);
    font-size: 10px;
    margin-top: 3px;
    flex-shrink: 0;
  }

  /* ── Paleta de cor ── */
  .color-palette {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .color-chip {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    position: relative;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .color-chip:hover { transform: scale(1.15); }
  .color-chip-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    text-align: center;
    letter-spacing: 1px;
  }
  .chip-group { text-align: center; }

  /* ── Frequências adicionais ── */
  .extra-freqs {
    padding: 0 28px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .extra-freq-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
  }
  .extra-freq-pill:hover {
    border-color: var(--freq-color);
    color: var(--freq-color);
  }
  .extra-freq-pill.active {
    background: var(--freq-color);
    color: var(--bg);
    border-color: var(--freq-color);
  }

  /* ── Temporizador ── */
  .timer-section {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .timer-label {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .timer-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .timer-btn:hover, .timer-btn.active {
    border-color: var(--freq-color);
    color: var(--freq-color);
  }

  /* ── Afirmação ── */
  .affirmation-display {
    text-align: center;
    padding: 32px 28px;
    border-top: 1px solid var(--border);
  }
  .affirmation-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-style: italic;
    font-weight: 300;
    line-height: 1.5;
    color: var(--text);
    opacity: 0.85;
  }
  .affirmation-author {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    opacity: 0.6;
    margin-top: 12px;
    text-transform: uppercase;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding-top: 60px;
    font-size: 11px;
    color: var(--muted);
    opacity: 0.4;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="shell">
  <header>
    <span class="logo-mark">Vibrare</span>
    <h1>Viver em <em>Frequência</em></h1>
    <p class="subtitle">Som puro · Cor vibracional · Alinhamento total</p>
  </header>

  <div class="intention-box">
    <span class="intention-label">Qual é a sua intenção hoje?</span>
    <textarea id="intencao" rows="3" placeholder="Ex: quero atrair prosperidade e abundância… sinto ansiedade e preciso de calma… desejo despertar espiritualmente…"></textarea>
  </div>

  <button class="btn-invocar" id="btnInvocar" onclick="invocar()">
    ✦ &nbsp; Invocar Frequência &nbsp; ✦
  </button>

  <div class="loading" id="loading">
    <div class="loading-ring"></div>
    <p>Consultando os campos vibracionais…</p>
  </div>

  <div id="resultado"></div>

  <footer>Vibrare © 2026 &nbsp;·&nbsp; Som puro gerado em tempo real</footer>
</div>

<script>
window._gk=["AIzaSyBd2ATS5WzNSC87","ikdk6FGJn0aCO6kmHmM"].join("");
// ══════════════════════════════════════════════
//  CANVAS DE FUNDO — partículas e orbs
// ══════════════════════════════════════════════
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], orbs = [];
let bgColor1 = '#04030a', bgColor2 = '#04030a';

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function initParticles() {
  particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      a: Math.random(),
      color: '#c9a96e'
    });
  }
}
initParticles();

function initOrbs(c1, c2) {
  bgColor1 = c1 || '#04030a';
  bgColor2 = c2 || '#04030a';
  orbs = [
    { x: W * 0.25, y: H * 0.3, r: 280, color: c1 || '#1a0a2e', a: 0.55 },
    { x: W * 0.75, y: H * 0.6, r: 220, color: c2 || '#0a1a2e', a: 0.45 },
  ];
}
initOrbs();

function drawBg() {
  ctx.fillStyle = '#04030a';
  ctx.fillRect(0, 0, W, H);

  orbs.forEach(o => {
    const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
    g.addColorStop(0, hexA(o.color, o.a));
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  });

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    p.a = 0.3 + 0.4 * Math.abs(Math.sin(Date.now() * 0.001 + p.x));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = hexA(p.color, p.a);
    ctx.fill();
  });
}

function hexA(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function loop() { drawBg(); requestAnimationFrame(loop); }

//  WEB AUDIO ENGINE
// ══════════════════════════════════════════════
let audioCtx = null;
let mainOsc = null, binOsc = null, mainGain = null;
let isPlaying = false;
let currentFreq = 528;
let binauralOn = false;
let timerTimeout = null;
let timerSeconds = 0;
let elapsedInterval = null;
let elapsed = 0;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startSound(freq, vol, binaural) {
  stopSound();
  const ac = getAudio();
  mainGain = ac.createGain();
  mainGain.gain.setValueAtTime(0, ac.currentTime);
  mainGain.gain.linearRampToValueAtTime(vol, ac.currentTime + 0.5);
  mainGain.connect(ac.destination);

  // Canal esquerdo — frequência pura
  const merger = ac.createChannelMerger(2);
  merger.connect(mainGain);

  mainOsc = ac.createOscillator();
  mainOsc.type = 'sine';
  mainOsc.frequency.value = freq;
  const leftGain = ac.createGain(); leftGain.gain.value = 1;
  mainOsc.connect(leftGain);
  leftGain.connect(merger, 0, 0);
  mainOsc.start();

  if (binaural) {
    // Canal direito — offset binaural (10 Hz para theta profundo)
    binOsc = ac.createOscillator();
    binOsc.type = 'sine';
    binOsc.frequency.value = freq + 10;
    const rightGain = ac.createGain(); rightGain.gain.value = 1;
    binOsc.connect(rightGain);
    rightGain.connect(merger, 0, 1);
    binOsc.start();
  } else {
    // Som puro mono — mesmo tom nos dois canais
    const rightGain2 = ac.createGain(); rightGain2.gain.value = 1;
    mainOsc.connect(rightGain2);
    rightGain2.connect(merger, 0, 1);
  }

  isPlaying = true;
  elapsed = 0;
  elapsedInterval = setInterval(() => {
    elapsed++;
    updateDuration();
  }, 1000);
}

function stopSound() {
  if (mainOsc) { try { mainOsc.stop(); } catch(e){} mainOsc = null; }
  if (binOsc)  { try { binOsc.stop();  } catch(e){} binOsc  = null; }
  if (mainGain) { mainGain.disconnect(); mainGain = null; }
  isPlaying = false;
  clearInterval(elapsedInterval);
}

function setVolume(v) {
  if (mainGain) mainGain.gain.setTargetAtTime(v, audioCtx.currentTime, 0.1);
}

function updateDuration() {
  const el = document.getElementById('durDisplay');
  if (el) {
    const m = String(Math.floor(elapsed/60)).padStart(2,'0');
    const s = String(elapsed%60).padStart(2,'0');
    el.textContent = m + ':' + s;
  }
}

let waveInterval = null;
function startWave() {
  const bars = document.querySelectorAll('.wave-bar');

}

//  CONTROLES
// ══════════════════════════════════════════════
function togglePlay() {
  const btn = document.getElementById('btnPlay');
  if (isPlaying) {
    stopSound();
    btn.textContent = '▶';
    btn.classList.remove('active');
  } else {
    const vol = document.querySelector('input[type=range]')?.value || 0.5;
    startSound(currentFreq, +vol, binauralOn);
    btn.textContent = '■';
    btn.classList.add('active');
  }
}

function toggleBinaural() {
  binauralOn = !binauralOn;
  const t = document.getElementById('binToggle');
  t.classList.toggle('on', binauralOn);
  if (isPlaying) {
    const vol = document.querySelector('input[type=range]')?.value || 0.5;
    startSound(currentFreq, +vol, binauralOn);
  }
}

function selectExtraFreq(el, hz) {
  document.querySelectorAll('.extra-freq-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentFreq = hz;
  document.getElementById('hzDisplay').textContent = hz + ' Hz';
  if (isPlaying) {
    const vol = document.querySelector('input[type=range]')?.value || 0.5;
    startSound(hz, +vol, binauralOn);
  }
}

function setTimer(min, btn) {
  document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  clearTimeout(timerTimeout);
  if (min > 0) {
    timerTimeout = setTimeout(() => {
      stopSound();
      const playBtn = document.getElementById('btnPlay');
      if (playBtn) { playBtn.textContent = '▶'; playBtn.classList.remove('active'); }
    }, min * 60 * 1000);
  }
}

function hexToRgba(hex, a) {
  if (!hex || hex.length < 7) return `rgba(201,169,110,${a})`;
  const r = parseInt(hex.slice(1,3),16)||0;
  const g = parseInt(hex.slice(3,5),16)||0;
  const b = parseInt(hex.slice(5,7),16)||0;
  return `rgba(${r},${g},${b},${a})`;
}
